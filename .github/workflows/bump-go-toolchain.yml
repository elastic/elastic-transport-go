name: Bump Go Toolchain

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-go-toolchain:
    name: Bump Go Toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.x"

      - name: Determine target Go toolchain version
        id: target
        run: |
          VERSIONS=$(curl -sfL 'https://go.dev/dl/?mode=json' \
            | jq -r '.[] | select(.stable) | .version' \
            | sed 's/^go//')

          if [ -z "$VERSIONS" ]; then
            echo "::error::Failed to fetch Go releases"
            exit 1
          fi

          LATEST_MINOR=$(echo "$VERSIONS" | head -1 | cut -d. -f1,2)

          TARGET_VERSION=""
          while IFS= read -r v; do
            minor=$(echo "$v" | cut -d. -f1,2)
            if [ "$minor" != "$LATEST_MINOR" ]; then
              TARGET_VERSION="$v"
              break
            fi
          done <<< "$VERSIONS"

          if [ -z "$TARGET_VERSION" ]; then
            echo "::error::Could not determine penultimate Go minor version"
            exit 1
          fi

          CURRENT=$(grep '^toolchain' go.mod | sed 's/toolchain go//')

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT, Target: $TARGET_VERSION"

      - name: Update go.mod toolchain
        if: steps.target.outputs.current != steps.target.outputs.target
        run: go mod edit -toolchain=go${{ steps.target.outputs.target }}

      - name: Create Pull Request
        if: steps.target.outputs.current != steps.target.outputs.target
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump go toolchain to go${{ steps.target.outputs.target }}"
          branch: chore/bump-go-toolchain
          delete-branch: true
          title: "chore: bump go toolchain to go${{ steps.target.outputs.target }}"
          body: |
            Bumps the Go toolchain directive in `go.mod` from `go${{ steps.target.outputs.current }}` to `go${{ steps.target.outputs.target }}`.

            This is the latest patch release of the penultimate supported Go minor version.

            Auto-generated by GitHub Actions.
          base: main
